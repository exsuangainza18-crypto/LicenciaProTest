<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Prioridades de Paso - LicenciaPro</title>
  <style>
    /* Mismos estilos que la Categoría 3 */
    :root { --primary: #6C5CE7; --dark: #2D3436; --light: #F7F9FC; --shadow: 0 4px 15px rgba(0,0,0,0.06); }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--light); padding: 15px; }
    .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; position: sticky; top: 0; background: var(--light); padding: 10px 0; z-index: 10; }
    .btn-back { background: white; border: 1.5px solid #8e80d4; padding: 10px; border-radius: 12px; width: 45px; height: 45px; cursor: pointer; box-shadow: var(--shadow); font-size: 1.2rem; font-weight: bold; }
    .title-box h1 { font-size: 1.1rem; font-weight: 900; text-transform: uppercase; color: #222; }
    .title-box p { color: var(--primary); font-weight: 800; font-size: 0.75rem; text-transform: uppercase; }
    .search-container { position: sticky; top: 65px; background: var(--light); padding-bottom: 12px; z-index: 9; }
    .search-box { width: 100%; padding: 15px; border-radius: 16px; border: 1.5px solid #ddd; outline: none; font-size: 1rem; box-shadow: var(--shadow); }
    .art-card { background: white; padding: 20px; border-radius: 18px; margin-bottom: 15px; box-shadow: var(--shadow); border-left: 6px solid var(--primary); }
    .section-tag { background: #f0eff8; color: var(--primary); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; margin-bottom: 8px; display: inline-block; text-transform: uppercase; }
    .art-card h3 { color: var(--primary); font-size: 1.05rem; font-weight: 800; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    .art-card p { font-size: 0.95rem; line-height: 1.6; color: #333; text-align: justify; white-space: pre-line; }
    .no-results { text-align: center; padding: 40px; color: #999; font-weight: 700; }
  </style>
</head>
<body>
  <div class="header">
    <button class="btn-back" onclick="window.location.href='../../../../ley109.html'">←</button>
    <div class="title-box">
      <p>Categoría 4</p>
      <h1>Prioridades de Paso</h1>
    </div>
  </div>

  <div class="search-container">
    <input type="text" id="searchArt" class="search-box" placeholder="Busca intersección, rotonda, ambulancia..." onkeyup="filterArt()">
  </div>

  <div id="art-container"></div>

<script>
  const articulos = [
    { n: 126, s: "INTERSECCIONES", d: "El conductor de cualquier vehículo que llegue a una intersección debe ceder el paso a los vehículos que ya se encuentran en ella." },
    { n: 127, s: "SEÑALES", d: "En las intersecciones con señales de Pare o Ceda el Paso, los conductores deben cumplir estrictamente lo que estas indican, independientemente de la visibilidad." },
    { n: 128, s: "REGLA DE LA DERECHA", d: "En intersecciones de igual categoría sin señalización, el conductor está obligado a disminuir la velocidad y ceder el paso al vehículo que se aproxime por su derecha." },
    { n: 129, s: "ACCESOS", d: "Los conductores que se incorporen a una vía desde un acceso privado, como un garaje o estacionamiento, deben ceder el paso a los vehículos que circulan por la vía principal." },
    { n: 130, s: "ROTONDAS", d: "En las rotondas o glorietas, los vehículos que ya circulan por el anillo tienen prioridad de paso sobre los que pretenden incorporarse, salvo que exista una señalización que indique otra regulación." },
    { n: 135, s: "VÍAS ESTRECHAS", d: "En tramos de vía estrechos donde no sea posible el paso simultáneo, el vehículo que llegó primero tiene la prioridad. En caso de pendientes, el vehículo que sube tiene prioridad sobre el que baja." },
    { n: 140, s: "RÉGIMEN ESPECIAL", d: "Los vehículos con régimen especial (ambulancias, bomberos, Policía Nacional Revolucionaria) en función de un servicio urgente, y que accionen la sirena y las luces lumínicas, tienen prioridad absoluta de paso sobre el resto de los usuarios de la vía." }
  ];

  function loadArts(data) {
    const container = document.getElementById('art-container');
    if(data.length === 0) {
      container.innerHTML = '<div class="no-results">No se encontraron artículos.</div>'; return;
    }
    container.innerHTML = data.map(art => `
      <div class="art-card">
        <span class="section-tag">${art.s}</span>
        <h3>ARTÍCULO ${art.n}</h3>
        <p>${art.d}</p>
      </div>`).join('');
  }

  function filterArt() {
    const q = document.getElementById('searchArt').value.toLowerCase();
    loadArts(articulos.filter(a => a.d.toLowerCase().includes(q) || a.n.toString().includes(q) || a.s.toLowerCase().includes(q)));
  }

  loadArts(articulos);
</script>
</body>
</html>
