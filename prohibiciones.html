<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Prohibiciones - LicenciaPro</title>
  <style>
    :root { --primary: #6C5CE7; --dark: #2D3436; --light: #F7F9FC; --shadow: 0 4px 15px rgba(0,0,0,0.06); }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--light); padding: 15px; }
    .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; position: sticky; top: 0; background: var(--light); padding: 10px 0; z-index: 10; }
    .btn-back { background: white; border: 1.5px solid #8e80d4; padding: 10px; border-radius: 12px; width: 45px; height: 45px; cursor: pointer; box-shadow: var(--shadow); font-size: 1.2rem; font-weight: bold; }
    .title-box h1 { font-size: 1.1rem; font-weight: 900; text-transform: uppercase; color: #222; }
    .title-box p { color: var(--primary); font-weight: 800; font-size: 0.75rem; text-transform: uppercase; }
    .search-container { position: sticky; top: 65px; background: var(--light); padding-bottom: 12px; z-index: 9; }
    .search-box { width: 100%; padding: 15px; border-radius: 16px; border: 1.5px solid #ddd; outline: none; font-size: 1rem; box-shadow: var(--shadow); }
    .art-card { background: white; padding: 20px; border-radius: 18px; margin-bottom: 15px; box-shadow: var(--shadow); border-left: 6px solid #ff4757; } /* Borde rojo para prohibiciones */
    .section-tag { background: #ffeaa7; color: #d63031; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; margin-bottom: 8px; display: inline-block; text-transform: uppercase; }
    .art-card h3 { color: #d63031; font-size: 1.05rem; font-weight: 800; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    .art-card p { font-size: 0.95rem; line-height: 1.6; color: #333; text-align: justify; white-space: pre-line; }
    .no-results { text-align: center; padding: 40px; color: #999; font-weight: 700; }
  </style>
</head>
<body>
  <div class="header">
    <button class="btn-back" onclick="window.location.href='../../../../ley109.html'">←</button>
    <div class="title-box">
      <p>Categoría 6</p>
      <h1>Prohibiciones Especiales</h1>
    </div>
  </div>

  <div class="search-container">
    <input type="text" id="searchArt" class="search-box" placeholder="Busca freno, escape, carga..." onkeyup="filterArt()">
  </div>

  <div id="art-container"></div>

<script>
  const articulos = [
    { n: 181, s: "PROHIBICIONES GENERALES", d: "Se prohíbe terminantemente conducir vehículos de motor, de tracción animal o ciclos:\n1) Bajo la influencia de bebidas alcohólicas o drogas.\n2) Con defectos técnicos en los sistemas de dirección o freno.\n3) Con exceso de carga o pasajeros sobrepasando la capacidad oficial del vehículo." },
    { n: 182, s: "DEFECTOS TÉCNICOS GRAVES", d: "Se considera infracción grave transitar con el sistema de frenos desajustado, salideros en el sistema de alimentación de combustible, desgaste excesivo de neumáticos o cuando la emisión de gases contaminantes por el escape sobrepase las normas establecidas." },
    { n: 189, s: "RUIDOS Y CLAXON", d: "Se prohíbe el uso de cláxones estridentes o sirenas (salvo vehículos de emergencia). En zonas urbanas, se prohíbe el uso del claxon desde las 10:00 p.m. hasta las 6:00 a.m., salvo peligro inminente." },
    { n: 191, s: "ESCAPES LIBRES", d: "Se prohíbe circular sin el dispositivo silenciador en el tubo de escape o con escapes libres que produzcan ruidos molestos que alteren la tranquilidad ciudadana." },
    { n: 193, s: "VISIBILIDAD", d: "Se prohíbe colocar en los parabrisas, ventanillas o espejos retrovisores, calcomanías, cortinas, cortinas de humo o cualquier otro material que impida u obstaculice la visibilidad del conductor." }
  ];

  function loadArts(data) {
    const container = document.getElementById('art-container');
    if(data.length === 0) {
      container.innerHTML = '<div class="no-results">No se encontraron artículos.</div>'; return;
    }
    container.innerHTML = data.map(art => `
      <div class="art-card">
        <span class="section-tag">${art.s}</span>
        <h3>ARTÍCULO ${art.n}</h3>
        <p>${art.d}</p>
      </div>`).join('');
  }

  function filterArt() {
    const q = document.getElementById('searchArt').value.toLowerCase();
    loadArts(articulos.filter(a => a.d.toLowerCase().includes(q) || a.n.toString().includes(q) || a.s.toLowerCase().includes(q)));
  }

  loadArts(articulos);
</script>
</body>
</html>
